<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Śpiewnik jubileuszowy – 25 lat razem</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1612;
      --surface:   #221e19;
      --amber:     #c8893a;
      --amber-dim: #8a5e24;
      --text:      #e8ddd0;
      --text-dim:  #8a7d6e;
      --divider:   #33291f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--divider);
      padding: 10px 16px 8px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    #song-counter {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--amber);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #song-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    #song-artist {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── LYRICS AREA ── */
    #stage {
      position: fixed;
      top: 48px; bottom: 56px;
      left: 0; right: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px 20px 16px;
    }

    #lyrics {
      font-size: 18px;
      line-height: 1.9;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* verse / chorus distinction via blank lines — no extra markup needed */

    /* ── FOOTER NAV ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: var(--bg);
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      gap: 8px;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      width: 44px; height: 36px;
      border-radius: 4px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .nav-btn:active { background: var(--amber-dim); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }

    #dot-track {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      overflow: hidden;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--divider);
      transition: background 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .dot.active {
      background: var(--amber);
      transform: scale(1.4);
    }

    /* ── SWIPE ANIMATION ── */
    #stage.swipe-left  { animation: swipeL 0.22s ease forwards; }
    #stage.swipe-right { animation: swipeR 0.22s ease forwards; }

    @keyframes swipeL {
      0%   { opacity: 1; transform: translateX(0); }
      40%  { opacity: 0; transform: translateX(-30px); }
      41%  { opacity: 0; transform: translateX(30px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes swipeR {
      0%   { opacity: 1; transform: translateX(0); }
      40%  { opacity: 0; transform: translateX(30px); }
      41%  { opacity: 0; transform: translateX(-30px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* ── FONT SIZE BUTTONS ── */
    #font-controls {
      position: fixed;
      top: 56px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 9;
    }
    .font-btn {
      background: var(--surface);
      border: 1px solid var(--divider);
      color: var(--text-dim);
      font-size: 14px;
      width: 28px; height: 26px;
      border-radius: 3px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .font-btn:active { color: var(--amber); border-color: var(--amber-dim); }

    @media (prefers-reduced-motion: reduce) {
      #stage.swipe-left, #stage.swipe-right { animation: none; }
    }
  </style>
</head>

<header>

Stoję smutny na peronie z tą walizką jedną,
tak jak człowiek, który zgubił od swego domu klucz.

Tam, dokąd chciałem, już nie dojdę, szkoda zdzierać nóg.
Już wędrówki naszej wspólnej nadchodzi kres.
Wy pójdziecie inną drogą, zostawicie mnie.
Zamazanych drogowskazów nie odczytam już.`
  },
  {
    title: "Stokrotka",
    artist: "",
    lyrics: `Gdzie strumyk płynie z wolna,
rozsiewa zioła maj,
stokrotka rosła polna,
a nad nią szumiał gaj.
W tym gaju tak ponuro,
że aż przeraża mnie,
ptaszęta za wysoko,
a mnie samotnej źle.

Wtem harcerz idzie z wolna.
„Stokrotko, witam cię,
twój urok mnie zachwyca,
czy chcesz być mą, czy nie?"

Stokrotka się zgodziła
i poszli w ciemny las,
a harcerz taki gapa
w pokrzywy wlazł po pas.

A ona, ona, ona,
cóż biedna robić ma,
nad gapą pochylona
i śmieje się: ha, ha!`
  }
];

// ═══════════════════════════════════════════════════════
//  LOGIKA APLIKACJI — nie musisz nic zmieniać poniżej
// ═══════════════════════════════════════════════════════

let current = 0;
let fontSize = 18;

const elCounter = document.getElementById('song-counter');
const elTitle   = document.getElementById('song-title');
const elArtist  = document.getElementById('song-artist');
const elLyrics  = document.getElementById('lyrics');
const elStage   = document.getElementById('stage');
const elDots    = document.getElementById('dot-track');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');

function buildDots() {
  elDots.innerHTML = '';
  const total = songs.length;
  const maxDots = 9;
  const count = Math.min(total, maxDots);
  for (let i = 0; i < count; i++) {
    const d = document.createElement('span');
    d.className = 'dot';
    d.dataset.idx = i < maxDots - 1 || total <= maxDots ? i : '…';
    elDots.appendChild(d);
  }
}

function updateDots() {
  const dots = elDots.querySelectorAll('.dot');
  const total = songs.length;
  if (total <= 9) {
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
  } else {
    // sliding window
    dots.forEach((d, i) => {
      let mapped = current - Math.floor(dots.length / 2) + i;
      mapped = Math.max(0, Math.min(total - 1, mapped));
      d.classList.toggle('active', mapped === current);
    });
  }
}

function render(dir) {
  const song = songs[current];
  elCounter.textContent = `${current + 1} / ${songs.length}`;
  elTitle.textContent   = song.title;
  elArtist.textContent  = song.artist || '';
  elLyrics.textContent  = song.lyrics;
  elStage.scrollTop = 0;

  btnPrev.disabled = current === 0;
  btnNext.disabled = current === songs.length - 1;
  updateDots();

  if (dir) {
    elStage.classList.remove('swipe-left', 'swipe-right');
    void elStage.offsetWidth; // reflow
    elStage.classList.add(dir === 'next' ? 'swipe-left' : 'swipe-right');
  }
}

function go(dir) {
  if (dir === 'next' && current < songs.length - 1) { current++; render('next'); }
  if (dir === 'prev' && current > 0)                { current--; render('prev'); }
}

btnNext.addEventListener('click', () => go('next'));
btnPrev.addEventListener('click', () => go('prev'));

// klawiatura (desktop)
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go('next');
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go('prev');
});

// swipe dotykowy
let touchX = null;
elStage.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
elStage.addEventListener('touchend',   e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) go(dx < 0 ? 'next' : 'prev');
  touchX = null;
}, { passive: true });

// rozmiar czcionki — przyciski
document.getElementById('btn-plus').addEventListener('click', () => {
  if (fontSize < 40) { fontSize += 2; elLyrics.style.fontSize = fontSize + 'px'; }
});
document.getElementById('btn-minus').addEventListener('click', () => {
  if (fontSize > 10) { fontSize -= 2; elLyrics.style.fontSize = fontSize + 'px'; }
});

// rozmiar czcionki — pinch-to-zoom (dwa palce)
let pinchDist0 = null;
let fontSizeAtPinchStart = fontSize;

function getPinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx, dy);
}

elStage.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchDist0 = getPinchDist(e.touches);
    fontSizeAtPinchStart = fontSize;
  }
}, { passive: true });

elStage.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchDist0 !== null) {
    const scale = getPinchDist(e.touches) / pinchDist0;
    const newSize = Math.round(fontSizeAtPinchStart * scale);
    fontSize = Math.min(40, Math.max(10, newSize));
    elLyrics.style.fontSize = fontSize + 'px';
  }
}, { passive: true });

elStage.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchDist0 = null;
}, { passive: true });

// INIT
buildDots();
render();
</script>
</body>
</html>
